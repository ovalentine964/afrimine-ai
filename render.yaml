# AfriMine AI — Render.com Blueprint
# https://render.com/docs/blueprint-spec

services:
  # ── Go Backend ─────────────────────────────────────────
  - type: web
    name: afrimine-backend
    runtime: docker
    dockerfilePath: docker/backend.Dockerfile
    region: frankfurt      # Closest to Kenya
    plan: free
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: warn
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        sync: false          # Set in dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        fromService:
          name: afrimine-redis
          property: connectionString
    # Health check configuration
    # Render will mark service unhealthy if:
    # - Health endpoint returns non-2xx
    # - Response time exceeds 30s (Render default)
    # - Service fails 3 consecutive checks
    # Automatic restart on unhealthy detection

  # ── Python AI Engine ───────────────────────────────────
  - type: web
    name: afrimine-ai-engine
    runtime: docker
    dockerfilePath: docker/ai-engine.Dockerfile
    region: frankfurt
    plan: free
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: warn
      - key: GEMINI_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
    # Health check: AI engine may take longer to start
    # due to model loading. Docker HEALTHCHECK has
    # start-period=30s to accommodate this.

  # ── Redis ──────────────────────────────────────────────
  - type: redis
    name: afrimine-redis
    plan: free
    region: frankfurt
    ipAccess: []
    maxmemoryPolicy: allkeys-lru
