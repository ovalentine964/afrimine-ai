# AfriMine AI — Test Pipeline
# Runs on every push and PR

name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go Backend Tests ────────────────────────────────
  go-test:
    name: Go Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: src/backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: src/backend/coverage.out

  # ── Python AI Engine Tests ──────────────────────────
  python-test:
    name: Python AI Engine Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ai-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/ai-engine/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .

      - name: Test
        run: pytest -v --tb=short --cov=. --cov-report=xml tests/
        env:
          SUPABASE_URL: "http://localhost:5432"
          SUPABASE_KEY: "test-key"
          GEMINI_API_KEY: "test-key"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: src/ai-engine/coverage.xml

  # ── Flutter Frontend Tests ──────────────────────────
  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: src/frontend/coverage/lcov.info

  # ── Docker Build Test ───────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t afrimine-backend:test .

      - name: Build AI engine image
        run: docker build -f docker/ai-engine.Dockerfile -t afrimine-ai-engine:test .

  # ── SQL Migration Validation ────────────────────────
  sql-validate:
    name: Validate SQL Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: supabase/postgres:15.1.0
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Running $f..."
            PGPASSWORD=test psql -h localhost -U test -d test -f "$f"
          done
        env:
          PGHOST: localhost
          PGUSER: test
          PGPASSWORD: test
