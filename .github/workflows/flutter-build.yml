name: Build & Deploy Flutter

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/frontend/**'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  # ─── TEST ───────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: src/frontend
        run: flutter pub get

      - name: Analyze code
        working-directory: src/frontend
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: src/frontend
        run: flutter test --coverage

  # ─── BUILD ANDROID APK ─────────────────────────────
  build-android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: src/frontend
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: src/frontend
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: afrimine-apk
          path: src/frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ─── BUILD WEB ─────────────────────────────────────
  build-web:
    name: Build Web
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: src/frontend
        run: flutter pub get

      - name: Build Web
        working-directory: src/frontend
        run: flutter build web --release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: afrimine-web
          path: src/frontend/build/web
          retention-days: 30

  # ─── DEPLOY WEB TO CLOUDFLARE PAGES ────────────────
  deploy-web:
    name: Deploy Web to Cloudflare
    needs: build-web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: afrimine-web
          path: build/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=afrimine

  # ─── CREATE RELEASE ────────────────────────────────
  release:
    name: Create Release
    needs: [build-android, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: afrimine-apk
          path: artifacts/apk

      - name: Download Web
        uses: actions/download-artifact@v4
        with:
          name: afrimine-web
          path: artifacts/web

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: AfriMine AI Build ${{ github.run_number }}
          body: |
            ## AfriMine AI — Build ${{ github.run_number }}

            ### Downloads
            - **Android APK**: Download `app-release.apk` below
            - **Web**: Deployed to Cloudflare Pages

            ### Changes
            ${{ github.event.head_commit.message }}

            ---
            Built with ❤️ for Nyatike, Migori County, Kenya
          files: |
            artifacts/apk/app-release.apk
          draft: false
          prerelease: false
