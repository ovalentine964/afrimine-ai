name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create Flutter Android project
        working-directory: src/frontend
        run: |
          # If android directory is incomplete, recreate it
          if [ ! -f android/app/build.gradle.kts ] && [ ! -f android/app/build.gradle ]; then
            flutter create --org com.afrimine --project-name afrimine_ai --platforms android .
          fi

      - name: Install dependencies
        working-directory: src/frontend
        run: flutter pub get

      - name: Build APK
        working-directory: src/frontend
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: afrimine-apk-${{ github.run_number }}
          path: src/frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: AfriMine AI v${{ github.run_number }}
          body: |
            ## AfriMine AI — Build ${{ github.run_number }}
            - **APK**: Download `app-release.apk` below
            - Install on Android device
            ---
            Built for Nyatike, Migori County, Kenya 🇰🇪
          files: src/frontend/build/app/outputs/flutter-apk/app-release.apk
