name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Setup Android project
        working-directory: src/frontend
        run: |
          # Save our custom main.dart
          cp lib/main.dart /tmp/main.dart
          
          # Create temp project to get proper Android structure
          cd /tmp
          flutter create --org com.afrimine --project-name afrimine_temp --platforms android afrimine_temp
          
          # Copy android directory to our project
          cp -r /tmp/afrimine_temp/android $GITHUB_WORKSPACE/src/frontend/
          
          # Restore our custom main.dart
          cp /tmp/main.dart $GITHUB_WORKSPACE/src/frontend/lib/main.dart
          
          # Clean up
          rm -rf /tmp/afrimine_temp /tmp/main.dart

      - name: Install dependencies
        working-directory: src/frontend
        run: flutter pub get

      - name: Build APK
        working-directory: src/frontend
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: afrimine-apk
          path: src/frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
