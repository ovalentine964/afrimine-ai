name: Build & Deploy Flutter

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: src/frontend
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: src/frontend
        run: flutter build apk --release --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: afrimine-apk
          path: src/frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: afrimine-apk
          path: artifacts/apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: AfriMine AI Build ${{ github.run_number }}
          body: |
            ## AfriMine AI — Build ${{ github.run_number }}

            ### Downloads
            - **Android APK**: Download `app-release.apk` below

            ### Changes
            ${{ github.event.head_commit.message }}

            ---
            Built with ❤️ for Nyatike, Migori County, Kenya
          files: |
            artifacts/apk/app-release.apk
          draft: false
          prerelease: false
