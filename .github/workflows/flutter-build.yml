name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Build
        working-directory: src/frontend
        run: |
          # Save our code
          mkdir -p /tmp/afrimine_save
          cp -r lib /tmp/afrimine_save/
          cp pubspec.yaml /tmp/afrimine_save/
          
          # Create fresh Flutter project in temp dir
          cd /tmp
          flutter create --org com.afrimine --project-name afrimine_build --platforms android afrimine_build
          
          # Copy our code into the fresh project
          cp -r /tmp/afrimine_save/lib/* /tmp/afrimine_build/lib/
          cp /tmp/afrimine_save/pubspec.yaml /tmp/afrimine_build/
          
          # Build
          cd /tmp/afrimine_build
          flutter pub get
          flutter build apk --release
          
          # Copy APK back
          mkdir -p $GITHUB_WORKSPACE/build
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: afrimine-apk
          path: app-release.apk
          retention-days: 90
