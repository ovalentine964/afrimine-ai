# AfriMine AI — Deploy to Staging
# Triggered on PR merge to main (or manual dispatch)
# Deploys: Flutter Web → Cloudflare Pages (staging), Python agents → Railway (staging)

name: Deploy Staging

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy)'
        type: boolean
        default: false

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.24'
  PYTHON_VERSION: '3.12'

jobs:
  # ─────────────────────────────────────────────
  # Gate: only run on merged PRs or manual dispatch
  # ─────────────────────────────────────────────
  check:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true)
    outputs:
      should_deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - id: check
        run: echo "deploy=true" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Run tests before staging deploy
  # ─────────────────────────────────────────────
  test:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest
    needs: check
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Quick Python tests
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pytest tests/test_agents/ tests/test_graph.py -x --tb=short -q

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Quick Flutter tests
        run: |
          flutter pub get
          flutter test --no-pub

  # ─────────────────────────────────────────────
  # Deploy Flutter Web → Cloudflare Pages (staging)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Staging)
    runs-on: ubuntu-latest
    needs: [check, test]
    if: always() && needs.check.result == 'success'
    environment:
      name: staging
      url: https://staging.afrimine.com
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Build Flutter Web (staging)
        run: |
          flutter pub get
          flutter build web --release \
            --dart-define=ENV=staging \
            --dart-define=API_URL=https://staging-api.afrimine.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy build/web
            --project-name=afrimine-web
            --branch=staging
            --commit-hash=${{ github.sha }}

  # ─────────────────────────────────────────────
  # Deploy Python Agents → Railway (staging)
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Staging)
    runs-on: ubuntu-latest
    needs: [check, test]
    if: always() && needs.check.result == 'success'
    environment:
      name: staging
      url: https://staging-api.afrimine.com
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
        run: |
          railway link --project afrimine-staging
          railway up --service langgraph-staging

      - name: Health check
        run: |
          sleep 30
          for i in {1..5}; do
            if curl -sf https://staging-api.afrimine.com/health; then
              echo "✅ Backend healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Backend health check failed"
          exit 1

  # ─────────────────────────────────────────────
  # Post-deploy verification
  # ─────────────────────────────────────────────
  verify:
    name: Post-deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Check frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.afrimine.com)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend staging is up (HTTP $STATUS)"
          else
            echo "⚠️ Frontend returned HTTP $STATUS"
          fi

      - name: Check backend API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging-api.afrimine.com/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend staging is up (HTTP $STATUS)"
          else
            echo "⚠️ Backend returned HTTP $STATUS"
          fi

      - name: Smoke test analysis endpoint
        run: |
          # Basic smoke test — should return 401 without auth, not 500
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://staging-api.afrimine.com/v1/analyses \
            -H "Content-Type: application/json" \
            -d '{}')
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "✅ Analysis endpoint returns auth error (expected)"
          elif [ "$STATUS" = "500" ]; then
            echo "❌ Analysis endpoint returned 500 — possible crash"
            exit 1
          else
            echo "ℹ️ Analysis endpoint returned HTTP $STATUS"
          fi

      - name: Notify deployment
        if: failure()
        run: |
          echo "::error::Staging deployment verification failed. Check logs above."
