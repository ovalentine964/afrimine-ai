# AfriMine AI — Security Scanning
# gitleaks, govulncheck, pip-audit, gosec, bandit, trivy

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Full scan every Monday 8 AM UTC
    - cron: '0 8 * * 1'
    # Dependency check Wednesday 8 AM UTC
    - cron: '0 8 * * 3'

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Secret Detection — gitleaks
  # ─────────────────────────────────────────────
  secret-detection:
    name: Secret Detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 2. Go Dependency Scanning — govulncheck
  # ─────────────────────────────────────────────
  go-dependency-scan:
    name: Go Dependency Scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Check for updates
        if: github.event_name == 'schedule'
        run: |
          echo "## Go Dependency Updates" >> $GITHUB_STEP_SUMMARY
          go list -m -u all 2>/dev/null | grep '\[' | head -20 >> $GITHUB_STEP_SUMMARY || echo "All up to date" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # 3. Python Dependency Scanning — pip-audit
  # ─────────────────────────────────────────────
  python-dependency-scan:
    name: Python Dependency Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --desc --output pip-audit.json --format json || true

      - name: Report results
        if: always()
        run: |
          pip-audit -r requirements.txt --desc 2>&1 | head -50
          echo ""
          echo "---"
          pip-audit -r requirements.txt 2>&1 | tail -5

  # ─────────────────────────────────────────────
  # 4. Go SAST — gosec
  # ─────────────────────────────────────────────
  go-sast:
    name: Go Security Analysis (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
          category: gosec

  # ─────────────────────────────────────────────
  # 5. Python SAST — bandit
  # ─────────────────────────────────────────────
  python-sast:
    name: Python Security Analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: |
          bandit -r agents/ security/ tools/ \
            -f sarif -o bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Human-readable report
        if: always()
        run: |
          bandit -r agents/ security/ tools/ \
            --severity-level medium \
            --confidence-level medium \
            -f screen || true

  # ─────────────────────────────────────────────
  # 6. Container Scanning — trivy
  # ─────────────────────────────────────────────
  container-scan:
    name: Container Scan (trivy)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [Dockerfile.go-backend, Dockerfile.python-agents]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          IMAGE_NAME="afrimine-${{ matrix.dockerfile == 'Dockerfile.go-backend' && 'api' || 'agents' }}"
          docker build -f ${{ matrix.dockerfile }} -t ${IMAGE_NAME}:scan .

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          severity: CRITICAL,HIGH

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.dockerfile == "Dockerfile.go-backend" && "afrimine-api" || "afrimine-agents" }}:scan'
          format: sarif
          output: trivy-${{ matrix.dockerfile }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.dockerfile }}.sarif
          category: trivy-${{ matrix.dockerfile }}

  # ─────────────────────────────────────────────
  # 7. License Compliance
  # ─────────────────────────────────────────────
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Check Go licenses
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... \
            --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,0BSD,Unlicense \
            2>&1 | head -30

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check Python licenses
        run: |
          pip install pip-licenses
          pip-licenses --fail-on='GPL' --format=table | head -30

  # ─────────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [secret-detection, go-dependency-scan, python-dependency-scan, go-sast, python-sast, container-scan]
    if: always()
    steps:
      - name: Generate summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🔒 Security Scan Results

          | Check | Status |
          |-------|--------|
          | Secret Detection (gitleaks) | ${{ needs.secret-detection.result }} |
          | Go Dependencies (govulncheck) | ${{ needs.go-dependency-scan.result }} |
          | Python Dependencies (pip-audit) | ${{ needs.python-dependency-scan.result }} |
          | Go SAST (gosec) | ${{ needs.go-sast.result }} |
          | Python SAST (bandit) | ${{ needs.python-sast.result }} |
          | Container Scan (trivy) | ${{ needs.container-scan.result }} |

          > View SARIF files in **Code scanning alerts** for detailed findings.
          EOF

      - name: Fail if critical
        if: >-
          needs.secret-detection.result == 'failure' ||
          needs.go-dependency-scan.result == 'failure' ||
          needs.python-dependency-scan.result == 'failure'
        run: |
          echo "❌ Critical security issues found. Blocking merge."
          exit 1
