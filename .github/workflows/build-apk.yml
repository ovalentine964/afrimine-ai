name: Build Android APK

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/frontend/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/frontend/**'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API backend URL'
        required: false
        default: 'https://api.afrimine.com'

# Cancel in-progress runs for same branch
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable Flutter web and Android
        run: |
          flutter config --enable-android
          flutter doctor -v

      - name: Get dependencies
        working-directory: src/frontend
        run: flutter pub get

      - name: Run Flutter analyze
        working-directory: src/frontend
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || echo "⚠️ Analyzer warnings (non-blocking)"

      - name: Run Flutter tests
        working-directory: src/frontend
        run: flutter test --coverage || echo "⚠️ Tests failed or not configured"

      - name: Determine API URL
        id: api-url
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "url=${{ github.event.inputs.api_url }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "url=https://api.afrimine.com" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://staging-api.afrimine.com" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK (arm64-v8a)
        working-directory: src/frontend
        run: |
          flutter build apk --release \
            --split-per-abi \
            --dart-define=API_URL=${{ steps.api-url.outputs.url }}

      - name: Build APK (armeabi-v7a)
        working-directory: src/frontend
        run: |
          flutter build apk --release \
            --split-per-abi \
            --target-platform android-arm \
            --dart-define=API_URL=${{ steps.api-url.outputs.url }}

      - name: Get APK sizes
        id: sizes
        run: |
          APK_DIR="src/frontend/build/app/outputs/flutter-apk"
          echo "## 📱 APK Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for apk in "$APK_DIR"/*.apk; do
            if [[ -f "$apk" ]]; then
              SIZE=$(du -h "$apk" | cut -f1)
              BASENAME=$(basename "$apk")
              echo "- **$BASENAME**: $SIZE" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: afrimine-ai-arm64-v8a
          path: src/frontend/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: afrimine-ai-armeabi-v7a
          path: src/frontend/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Comment on PR with download links
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const arm64Url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## 📱 Android APK Build

            ✅ APKs built successfully!

            | Architecture | Status |
            |---|---|
            | arm64-v8a (modern phones) | ✅ Built |
            | armeabi-v7a (older phones) | ✅ Built |

            **API URL:** \`${{ steps.api-url.outputs.url }}\`

            📥 [Download APKs from Artifacts](${arm64Url})

            <sub>Built by AfriMine AI CI • Commit ${context.sha.substring(0, 7)}</sub>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
