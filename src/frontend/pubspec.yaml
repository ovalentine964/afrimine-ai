name: afrimine_ai
description: AfriMine AI — Field mineral analysis for African mining communities
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # Local Storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Camera & Location
  camera: ^0.11.0+2
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  image: ^4.2.0

  # Maps
  maplibre_gl: ^0.19.0

  # Voice
  flutter_tts: ^4.0.2
  record: ^5.1.2
  audioplayers: ^5.2.1
  vosk_flutter: ^0.3.45

  # Connectivity
  connectivity_plus: ^6.0.3

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0

  # Utils
  uuid: ^4.4.0
  logger: ^2.3.0
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
    - assets/icons/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
