name: afrimine_ai
description: AfriMine AI — Mineral detection platform for Kenyan mining families
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # Auth & Backend
  supabase_flutter: ^2.5.6

  # Local Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Networking
  dio: ^5.4.3+1

  # Camera & Media
  camera: ^0.11.0+1
  image_picker: ^1.1.2

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.4

  # Charts
  fl_chart: ^0.68.0

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Storage & Cache
  shared_preferences: ^2.2.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
