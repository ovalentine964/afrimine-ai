# AfriMine AI — Railway Deployment Configuration
# https://docs.railway.app/reference/config

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.python-agents"

[deploy]
startCommand = "python -m uvicorn a2a_bridge:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info --timeout-keep-alive 300"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Railway hobby plan: 512MB RAM, shared vCPU
# Scale to Pro when: memory >400MB sustained or >500 execution hours/month
[deploy.resources]
memory = "512Mi"

# Environment variables — set via `railway variables set`
# Required:
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   SUPABASE_DB_HOST
#   SUPABASE_DB_PASSWORD
#   GOOGLE_API_KEY
#   GROQ_API_KEY
#   MISTRAL_API_KEY
#   LANGSMITH_API_KEY
#   SENTRY_DSN
# Optional:
#   LOG_LEVEL (default: info)
#   LANGGRAPH_ENV (default: production)
#   EARTH_ENGINE_KEY

[environments.staging]
# Staging uses the same Dockerfile, different env vars
[environments.staging.deploy]
startCommand = "python -m uvicorn a2a_bridge:app --host 0.0.0.0 --port $PORT --workers 1 --log-level debug"
