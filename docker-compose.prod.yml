# AfriMine AI — Production
# docker compose -f docker-compose.prod.yml up -d

version: "3.9"

services:
  # ── Go Backend API ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: afrimine-backend-prod
    ports:
      - "8080:8080"
    env_file:
      - .env.production
    environment:
      - GIN_MODE=release
      - LOG_LEVEL=warn
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - afrimine-prod
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Python AI Engine ────────────────────────────────
  ai-engine:
    build:
      context: .
      dockerfile: docker/ai-engine.Dockerfile
    container_name: afrimine-ai-engine-prod
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      - LOG_LEVEL=warn
    volumes:
      - ai-models-prod:/app/models
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - afrimine-prod
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: afrimine-redis-prod
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - afrimine-prod
    restart: always

  # ── Nginx Reverse Proxy ─────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: afrimine-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - ai-engine
    networks:
      - afrimine-prod
    restart: always

volumes:
  ai-models-prod:
  redis-data-prod:

networks:
  afrimine-prod:
    driver: bridge
