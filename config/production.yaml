# AfriMine AI — Production Configuration

app:
  name: afrimine-ai
  env: production
  port: 8080
  log_level: warn
  log_format: json

server:
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 120s
  max_header_bytes: 1MB

database:
  url: ${DATABASE_URL}        # from env
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m
  ssl_mode: require

redis:
  url: ${REDIS_URL}
  max_retries: 3
  pool_size: 20

ai:
  primary_model: gemini-2.5-flash
  backup_model: mistral-small
  speed_model: groq/llama3-70b
  timeout: 45s
  max_retries: 3
  cache_ttl: 24h

storage:
  provider: supabase
  bucket: afrimine-samples
  max_upload_mb: 20
  allowed_types:
    - image/jpeg
    - image/png
    - image/webp
    - audio/webm

auth:
  jwt_expiry: 24h
  require_email_verify: true

rate_limit:
  enabled: true
  requests_per_minute: 60
  burst: 10

sentry:
  enabled: true
  dsn: ${SENTRY_DSN}
  environment: production
  traces_sample_rate: 0.1
  profiles_sample_rate: 0.1

cors:
  allowed_origins:
    - https://afrimine.ai
    - https://www.afrimine.ai
    - https://afrimine.pages.dev

health:
  enabled: true
  path: /health
  include_db: true
  include_redis: true
