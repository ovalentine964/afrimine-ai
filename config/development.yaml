# AfriMine AI — Development Configuration

app:
  name: afrimine-ai
  env: development
  port: 8080
  log_level: debug
  log_format: text

server:
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  max_header_bytes: 1MB

database:
  # Local PostgreSQL via docker-compose
  url: postgresql://afrimine:afrimine_dev_pass@localhost:5432/afrimine
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 5m
  ssl_mode: disable

redis:
  url: redis://localhost:6379/0
  max_retries: 3
  pool_size: 10

ai:
  primary_model: gemini-2.5-flash
  backup_model: mistral-small
  speed_model: groq/llama3-70b
  timeout: 60s
  max_retries: 3
  cache_ttl: 1h

storage:
  provider: supabase
  bucket: afrimine-samples
  max_upload_mb: 20
  allowed_types:
    - image/jpeg
    - image/png
    - image/webp
    - audio/webm

auth:
  jwt_expiry: 72h      # longer for dev
  require_email_verify: false

rate_limit:
  enabled: false       # disabled in dev
  requests_per_minute: 1000

sentry:
  enabled: false

cors:
  allowed_origins:
    - http://localhost:3000
    - http://localhost:8080
    - http://127.0.0.1:3000
