worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Logging ──────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ── Gzip ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Rate Limiting ────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ai:10m rate=5r/s;

    # ── Backend API ──────────────────────────────────
    upstream backend {
        server backend:8080;
    }

    # ── AI Engine ────────────────────────────────────
    upstream ai_engine {
        server ai-engine:8000;
    }

    # ── HTTP → HTTPS redirect ────────────────────────
    server {
        listen 80;
        server_name afrimine.ai api.afrimine.ai;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.afrimine.ai;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API Routes ───────────────────────────────
        location /v1/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }

        # ── AI Engine Routes ─────────────────────────
        location /ai/ {
            limit_req zone=ai burst=10 nodelay;
            proxy_pass http://ai_engine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;  # AI inference can be slow
        }

        # ── Health Checks ────────────────────────────
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        location /ai/health {
            proxy_pass http://ai_engine/health;
            access_log off;
        }

        # ── Deny everything else ─────────────────────
        location / {
            return 404;
        }
    }
}
